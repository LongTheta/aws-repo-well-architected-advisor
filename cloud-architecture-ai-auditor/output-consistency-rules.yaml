# Cloud Architecture AI Auditor — Output Consistency Rules
# All final reports must include these sections. See report-template.md.
# Operating modes: operating-modes.yaml, OPERATING_MODES.md

version: "1.0"

# -----------------------------------------------------------------------------
# REQUIRED SECTIONS (all final reports)
# -----------------------------------------------------------------------------
required_sections:
  1: report_header
  2: executive_summary
  3: inferred_architecture
  4: scorecard
  5: top_10_risks
  6: findings_deduplicated
  7: cost_snapshot
  8: tagging_compliance
  9: cheaper_alternatives
  10: over_engineering_check
  11: remediation_backlog
  12: target_state_architecture
  13: tradeoff_summary
  14: final_verdict

# -----------------------------------------------------------------------------
# SECTION DEFINITIONS (see report-template.md for full structure)
# -----------------------------------------------------------------------------
sections:
  report_header:
    fields: [project_name, operating_mode, repo_type, review_mode, review_date, reviewer, confidence_level]
    operating_mode: [repo_driven, spec_driven]
    reviewer: "Automated Architecture Review System"

  executive_summary:
    fields: [overall_health, key_strengths, top_risks, cost_posture, architecture_maturity, summary_statement]
    max_length: "1 page"
    maturity_levels: [Foundational, Emerging, Managed, Scaled, Optimized]

  inferred_architecture:
    components: [compute, networking, data_storage, cicd, iam_security, observability]
    evidence_tags: [Observed, Inferred, Missing Evidence]

  scorecard:
    pillars: [Security, Reliability, Cost Efficiency, Performance, Operations, Observability]
    scale: "0-10"
    include: [aws_well_architected_mapping, nist_alignment_summary]

  top_10_risks:
    per_risk: [title, severity, why_it_matters, affected_area]

  findings_deduplicated:
    groups: [Security, Cost, Reliability, DevOps, Observability, Governance]
    per_finding: [title, summary, evidence, evidence_type, severity, confidence, recommendation, effort, impact, framework_mapping]
    reference: finding-schema.yaml

  cost_snapshot:
    fields: [estimated_monthly_range, top_3_drivers, cost_confidence]
    ranges: ["<$50", "$50-$250", "$250-$1k", "$1k-$5k", "$5k+"]

  tagging_compliance:
    reference: tagging-compliance.yaml
    fields: [tagging_score, pct_resources_tagged, missing_tag_report, inconsistent_tag_report]
    include: [cost_integration, remediation]

  cheaper_alternatives:
    per_item: [current_approach, suggested_alternative, why_cheaper, tradeoffs, savings_potential]

  over_engineering_check:
    per_item: [what_overbuilt, why_unnecessary, simpler_alternative, risk_of_simplifying, savings]

  remediation_backlog:
    groups: [quick_wins, medium_term, strategic_redesign]
    per_item: [issue, recommendation, effort, impact, priority]

  target_state_architecture:
    include: [networking, iam, compute, data_storage, cicd, observability, cost_posture]
    options: [cheapest_safe_baseline, balanced_production, high_resilience]

  tradeoff_summary:
    tradeoffs: [cost_vs_reliability, simplicity_vs_flexibility, security_vs_usability, performance_vs_cost]

  final_verdict:
    fields: [overall_rating, recommended_next_step, summary]
    next_steps: [safe_to_deploy, needs_improvements, high_risk_redesign]

# -----------------------------------------------------------------------------
# REFERENCE
# -----------------------------------------------------------------------------
template: report-template.md

# -----------------------------------------------------------------------------
# CONSISTENCY RULES
# -----------------------------------------------------------------------------
rules:
  - "All findings must conform to finding-schema.yaml"
  - "Findings must be deduplicated per merge-logic-spec.yaml"
  - "Evidence must use evidence_type: observed, inferred, missing, contradictory"
  - "Recommendations must respect recommendation-guardrails.yaml"
  - "Use report-template.md structure"
  - "Clear, concise, professional tone; no fluff; actionable only"
  - "Tagging is mandatory; include Tagging Compliance section per tagging-compliance.yaml"
  - "Do not allow untagged resources in recommended architecture"
