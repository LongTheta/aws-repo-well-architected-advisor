# Terraform Apply — manual approval gate for production
# Configure GitHub environment "prod" with required reviewers for approval gate
name: Terraform Apply
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod  # Requires manual approval when configured in GitHub repo settings
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform init
      - run: terraform -chdir=terraform plan -out=tfplan
      - run: terraform -chdir=terraform apply -auto-approve tfplan
